version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - bankapp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://bankapp_user:bankapp_password@db:5432/bankapp_db
      - JWT_SECRET_KEY=your-super-secret-jwt-key-change-in-production
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - bankapp-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=bankapp_db
      - POSTGRES_USER=bankapp_user
      - POSTGRES_PASSWORD=bankapp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankapp_user -d bankapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bankapp-network

volumes:
  postgres_data:

networks:
  bankapp-network:
    driver: bridge